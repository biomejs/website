camino = "1.2.2"
# Needed to fix some weird dependency
lock_api = "0.4.14"
pulldown-cmark = "0.13.3"
schemars = "1.2.1"
serde = "1.0.228"
serde_json = "1.0.149"
ureq = "3.3.0"
