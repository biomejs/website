biome_json_formatter = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_json_parser = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_json_syntax = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_module_graph = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.0.1" }
biome_project_layout = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.0.1" }
biome_rowan = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_ruledoc_utils = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.0.1" }
biome_service = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.0.0" }
biome_string_case = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_test_utils = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.0.0" }
biome_text_edit = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
bpaf = { version = "0.9.24", features = ["docgen"] }
