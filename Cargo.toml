[package]
name = "codegen"
version = "0.1.0"
edition = "2024"
description = "Crate used to generate pages from the Rust source code of Biome"
publish = false

[lib]
name = "codegen"
path = "codegen/src/lib.rs"

[[bin]]
name = "codegen"
path = "codegen/src/main.rs"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[dependencies]
anyhow = "1.0.102"
biome_analyze = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7", features = ["schema"] }
biome_cli = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.0.0" }
biome_configuration = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.0.1", features = ["schema", "cli"] }
biome_console = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_css_analyze = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_css_parser = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_css_semantic = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.0.0" }
biome_css_syntax = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_deserialize = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.6.0" }
biome_diagnostics = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_flags = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.0.0" }
biome_formatter = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_fs = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_graphql_analyze = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.0.1" }
biome_graphql_parser = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.1.0" }
biome_graphql_syntax = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.1.0" }
biome_html_analyze = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_html_parser = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.0.1" }
biome_html_syntax = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_js_analyze = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_js_formatter = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_js_parser = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
biome_js_syntax = { git = "https://github.com/biomejs/biome.git", rev = "131019e161b69fd755742ba509b1c51fcb2af183", version = "0.5.7" }
